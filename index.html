<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Creator - Support Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #020202;
            overflow-x: hidden;
        }
        .font-sport { font-family: 'Orbitron', sans-serif; }

        /* Animation de grille perspective (Tech Vision) */
        .grid-bg {
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            transform: perspective(500px) rotateX(60deg);
            opacity: 0.3;
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .text-glow {
            animation: textPulse 2s infinite alternate;
        }
        @keyframes textPulse {
            from { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); opacity: 0.9; }
            to { text-shadow: 0 0 30px rgba(59, 130, 246, 1), 0 0 5px #fff; opacity: 1; }
        }

        .btn-tech {
            background: linear-gradient(45deg, #2563eb, #7c3aed);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-tech::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-tech:hover::before {
            left: 100%;
        }

        .glass-card {
            background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(59, 130, 246, 0.05);
        }

        .input-power {
            background: transparent;
            border-bottom: 2px solid #3b82f6;
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4 relative">

    <div class="absolute inset-0 z-0 overflow-hidden">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[150px] opacity-20 animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[150px] opacity-20 animate-pulse" style="animation-delay: 1s;"></div>
        <div class="grid-bg"></div>
    </div>

    <main x-data="{
            step: 1,
            name: '',
            number: '',
            amount: 500,
            isProcessing: false,
            errorMessage: '',
            transactionRef: '',
            nameError: '',
            numberError: '',
            showUssdButton: false,
            openPayApiKey: 'sk_88c2ed0aedaec198b1f258aab3ad436afcb8997b86f080477a3f6edeefc9f875',

            validateName() {
                const trimmed = this.name ? this.name.trim() : '';
                if (!trimmed) { this.nameError = 'Nom requis'; return false; }
                this.nameError = ''; return true;
            },
            validateNumber() {
                const trimmed = this.number ? this.number.trim() : '';
                const cleaned = trimmed.replace(/\D/g, '');
                if (cleaned.length < 9) { this.numberError = 'Numéro invalide'; return false; }
                this.numberError = ''; return true;
            },
            formatPhoneNumber(num) {
                let cleaned = num.replace(/\D/g, '');
                if (cleaned.startsWith('242')) return cleaned;
                if (cleaned.startsWith('0')) return '242' + cleaned.substring(1);
                return '242' + cleaned;
            },
            async processPayment() {
                this.isProcessing = true;
                this.errorMessage = '';
                
                const phoneNumber = this.formatPhoneNumber(this.number);
                const orderId = 'NEXT-' + Date.now();

                // Simulation de l'appel API (Utilise ton proxy habituel ici)
                try {
                    const response = await fetch('/api/payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            amount: parseFloat(this.amount),
                            payment_phone_number: phoneNumber,
                            customer_external_id: orderId,
                            provider: 'MTN',
                            metadata: { project: 'Next Creator Support', donor: this.name }
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'pending') {
                        this.transactionRef = data.reference;
                        this.showUssdButton = true;
                        this.errorMessage = '⏳ Confirmation requise sur votre mobile (' + phoneNumber + ')';
                        this.isProcessing = false;
                        // Logique de check status ici...
                    } else if (data.status === 'success') {
                        this.step = 3;
                        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    } else {
                        throw new Error(data.message || 'Erreur inconnue');
                    }
                } catch (e) {
                    this.isProcessing = false;
                    this.errorMessage = '❌ ' + e.message;
                }
            }
        }"
        class="w-full max-w-lg relative z-20">

        <template x-if="step === 1">
            <div class="text-center space-y-8" x-transition>
                <div class="inline-block">
                    <span class="text-xs tracking-[0.4em] text-blue-400 border border-blue-400/50 px-4 py-1 rounded-full uppercase mb-4 block">Future Infrastructure</span>
                </div>
                
                <div class="relative">
                    <h1 class="text-6xl md:text-7xl font-sport font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-500">
                        NEXT<br>CREATOR
                    </h1>
                    <p class="mt-4 text-xl text-blue-200 font-medium tracking-wide">Bâtissons ensemble l'écosystème de demain.</p>
                </div>

                <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500 text-left">
                    <p class="text-gray-300 leading-relaxed">
                        Le programme <span class="text-white font-bold">Next Creator</span> soutient les innovateurs du numérique au Congo. Votre contribution finance le matériel, l'hébergement et le mentorat des futurs talents.
                    </p>
                </div>

                <button @click="step = 2"
                    class="btn-tech w-full py-5 rounded-xl font-bold uppercase tracking-widest text-lg transition-transform hover:scale-[1.02] active:scale-95">
                    Soutenir un Projet
                </button>
            </div>
        </template>

        <template x-if="step === 2">
            <div class="glass-card p-8 rounded-3xl" x-transition>
                <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
                    <h2 class="text-xl font-sport uppercase tracking-tight italic">Investment Portal</h2>
                    <span class="text-blue-500 font-bold">NEXT_v1.0</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-blue-400 mb-2 uppercase tracking-widest">Identité du Donateur</label>
                        <input type="text" x-model="name" placeholder="Votre nom ou entreprise"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 focus:border-blue-500 focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-blue-400 mb-2 uppercase tracking-widest">Compte de prélèvement (MoMo)</label>
                        <input type="tel" x-model="number" placeholder="06 600 00 00"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 focus:border-blue-500 focus:outline-none transition-all">
                    </div>

                    <div class="py-4 text-center">
                        <label class="block text-xs font-bold text-blue-400 mb-4 uppercase tracking-widest">Impact de la contribution (XAF)</label>
                        <div class="flex items-center justify-center gap-4">
                            <button @click="amount = Math.max(100, amount - 500)" class="w-12 h-12 rounded-lg bg-blue-500/10 border border-blue-500/30 text-xl hover:bg-blue-500 transition-colors">-</button>
                            <input type="number" x-model="amount" class="input-power !text-4xl w-48">
                            <button @click="amount = parseInt(amount) + 500)" class="w-12 h-12 rounded-lg bg-blue-500/10 border border-blue-500/30 text-xl hover:bg-blue-500 transition-colors">+</button>
                        </div>
                    </div>

                    <div x-show="errorMessage" class="p-4 rounded-xl bg-blue-900/30 border border-blue-500/50 text-sm text-center">
                        <p x-text="errorMessage" class="mb-3"></p>
                        <template x-if="showUssdButton">
                            <a href="tel:*105#" class="inline-block px-6 py-2 bg-green-600 rounded-lg font-bold">Lancer *105#</a>
                        </template>
                    </div>

                    <button :disabled="isProcessing" @click="processPayment()"
                        class="btn-tech w-full py-5 rounded-xl font-bold uppercase tracking-widest flex justify-center items-center gap-3">
                        <span x-show="!isProcessing">Propulser le Projet</span>
                        <span x-show="isProcessing" class="flex items-center gap-2">
                            <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                            Initialisation...
                        </span>
                    </button>
                    
                    <button @click="step = 1" class="w-full text-xs text-gray-500 uppercase hover:text-white transition-colors">Retour</button>
                </div>
            </div>
        </template>

        <template x-if="step === 3">
            <div class="text-center glass-card p-10 rounded-3xl border-2 border-blue-500" x-transition>
                <div class="w-24 h-24 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center text-4xl shadow-lg shadow-blue-500/50 rotate-3">
                    🚀
                </div>
                <h2 class="text-3xl font-sport mb-2 uppercase">Impact Confirmé</h2>
                <p class="text-gray-400 mb-8">Merci <span x-text="name" class="text-white font-bold"></span>, votre soutien propulse l'innovation locale.</p>
                
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 mb-8">
                    <span class="text-xs text-blue-400 block mb-1">CONTRIBUTION</span>
                    <span class="text-2xl font-bold" x-text="amount + ' XAF'"></span>
                </div>

                <button @click="window.location.reload()" class="text-blue-400 font-bold uppercase text-sm tracking-widest hover:text-white transition-colors">
                    Faire un autre don
                </button>
            </div>
        </template>
    </main>
</body>
</html>
